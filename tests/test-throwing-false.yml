name: Test throwing false when release not found
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          owner: actions
          repo: checkout
          tag_name: v99.99.99-nonexistent
          throwing: 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Assert action did not hard-fail
        run: |
          echo "Action completed without throwing (throwing=false)"
          echo "PASS"

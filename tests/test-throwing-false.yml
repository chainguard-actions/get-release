name: Test Throwing False When Release Not Found
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          owner: actions
          repo: checkout
          tag_name: v99.99.99-nonexistent
          throwing: 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert action did not fail
        run: |
          echo "Action completed without throwing - PASS"
          echo "id output: ${{ steps.action.outputs.id }}"
          echo "PASS: throwing=false did not cause failure when release not found"

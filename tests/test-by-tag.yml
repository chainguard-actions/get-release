name: Test get release by tag name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          owner: actions
          repo: checkout
          tag_name: v4.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert tag_name matches
        env:
          TAG: ${{ steps.action.outputs.tag_name }}
        run: |
          echo "tag_name: $TAG"
          if [ "$TAG" != "v4.2.2" ]; then
            echo "FAIL: expected tag_name to be 'v4.2.2', got '$TAG'"
            exit 1
          fi
          echo "PASS"
      - name: Assert name is set
        env:
          NAME: ${{ steps.action.outputs.name }}
        run: |
          echo "name: $NAME"
          if [ -z "$NAME" ]; then
            echo "FAIL: expected name to be non-empty"
            exit 1
          fi
          echo "PASS"

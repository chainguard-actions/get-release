name: Test get latest release with prerelease and pattern
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          owner: actions
          repo: checkout
          latest: 'true'
          prerelease: 'false'
          pattern: 'v4.*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert tag_name matches pattern
        env:
          TAG: ${{ steps.action.outputs.tag_name }}
        run: |
          echo "tag_name: $TAG"
          if [ -z "$TAG" ]; then
            echo "FAIL: expected tag_name to be non-empty"
            exit 1
          fi
          if [[ "$TAG" != v4.* ]]; then
            echo "FAIL: expected tag_name to match 'v4.*', got '$TAG'"
            exit 1
          fi
          echo "PASS"
